name: Tests (Vitest)

on:
  pull_request:
    branches: [ "main" ]
  push:
    branches: [ "main" ]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  unit-and-validation:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Instalar dependências
        run: npm ci

      - name: Testes unitários (Vitest)
        run: npm test

      - name: Smoke Wild Loop (Vitest)
        run: npm run test:wild-loop:vitest

      - name: Validar dados
        run: npm run validate-data

      - name: Validar assets de monstrinhos
        run: npm run validate:monster-assets

  wild-loop-e2e:
    runs-on: ubuntu-latest
    needs: unit-and-validation

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Instalar dependências
        run: npm ci

      - name: Instalar Playwright Chromium
        run: npx playwright install chromium --with-deps

      - name: E2E Wild Loop (Playwright)
        run: npm run test:wild-loop
